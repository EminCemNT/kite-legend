<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>星际风筝传说 - Star Kite Legend</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'PingFang SC','Microsoft YaHei',sans-serif;touch-action:none;-webkit-user-select:none;user-select:none;}
canvas{display:block;width:100%;height:100%;}
/* 开始菜单 */
#menu{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:radial-gradient(ellipse at center,#0d0d3a 0%,#050520 60%,#000 100%);overflow:hidden;}
#menu-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.menu-particle{position:absolute;width:2px;height:2px;background:#0ff;border-radius:50%;animation:floatUp 4s infinite;}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:0;}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-100vh) scale(0);opacity:0;}}
.menu-glow{position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(0,200,255,.15),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.6}50%{transform:translate(-50%,-50%) scale(1.3);opacity:1}}
#menu-inner{position:relative;z-index:2;text-align:center;padding:20px;}
.logo-icon{width:90px;height:90px;margin:0 auto 12px;position:relative;animation:logoFloat 2s ease-in-out infinite;}
.logo-kite{position:absolute;inset:0;}
.logo-kite svg{width:100%;height:100%;filter:drop-shadow(0 0 20px #0ff) drop-shadow(0 0 40px #06f);}
.logo-pulse{position:absolute;inset:-20px;border-radius:50%;background:radial-gradient(circle,rgba(0,200,255,.2),transparent 70%);animation:logoPulse 2s ease-in-out infinite;}
@keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes logoPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.2);opacity:1}}
.menu-title{font-size:40px;font-weight:900;color:#fff;letter-spacing:8px;background:linear-gradient(180deg,#fff 0%,#0cf 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;margin-bottom:4px;}
.menu-title-en{font-size:13px;color:rgba(0,200,255,.7);letter-spacing:6px;margin-bottom:8px;}
.menu-sub{font-size:13px;color:rgba(255,255,255,.5);letter-spacing:2px;margin-bottom:30px;line-height:1.8;}
#btn-start{padding:14px 56px;font-size:18px;font-weight:700;color:#000;background:linear-gradient(135deg,#0ff,#06f);border:none;border-radius:50px;cursor:pointer;pointer-events:auto;letter-spacing:4px;box-shadow:0 4px 30px rgba(0,180,255,.6),0 0 0 1px rgba(255,255,255,.4);transition:transform .1s,box-shadow .1s;}
#btn-start:active{transform:scale(.95);box-shadow:0 2px 15px rgba(0,180,255,.4);}
.menu-hint{margin-top:20px;font-size:11px;color:rgba(255,255,255,.3);letter-spacing:1px;}
.menu-stats{margin-top:16px;font-size:12px;color:rgba(255,255,255,.4);line-height:1.8;}
#skin-selector{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap;}
.skin-btn{width:44px;height:44px;border-radius:10px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);font-size:22px;cursor:pointer;pointer-events:auto;transition:all .2s;}
.skin-btn.active{border-color:#0cf;box-shadow:0 0 12px rgba(0,200,255,.4);background:rgba(0,200,255,.1);}
.skin-btn.locked{opacity:.3;filter:grayscale(1);cursor:not-allowed;}
.skin-lock{font-size:10px;display:block;line-height:1;}

/* 难度选择器 */
#difficulty-selector{display:flex;gap:6px;justify-content:center;margin:8px 0;flex-wrap:wrap;}
.diff-btn{padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);font-size:12px;font-weight:600;cursor:pointer;pointer-events:auto;transition:all .2s;letter-spacing:1px;}
.diff-btn:hover{border-color:rgba(255,255,255,.4);color:#fff;}
.diff-btn.active{border-color:var(--dc);box-shadow:0 0 12px var(--ds);background:var(--db);color:var(--dc);}
.diff-label{font-size:11px;color:rgba(255,255,255,.4);text-align:center;margin-top:2px;letter-spacing:1px;}

/* 结算面板 */
#gameover{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:30;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);}
.go-panel{background:rgba(10,10,40,.95);border:1px solid rgba(0,200,255,.3);border-radius:20px;padding:32px;text-align:center;box-shadow:0 0 60px rgba(0,150,255,.2);min-width:280px;max-width:360px;pointer-events:auto;animation:panelIn .3s ease-out;}
@keyframes panelIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.go-title{font-size:28px;font-weight:900;color:#e55;letter-spacing:3px;margin-bottom:4px;}
.go-sub{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:20px;}
.go-stat{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:14px;color:#aaa;}
.go-stat span:last-child{color:#fff;font-weight:700;}
.go-new{color:#0ff;font-size:11px;margin-left:6px;animation:blink .5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.go-coins{font-size:20px;color:#FFD700;margin:16px 0;font-weight:700;}
#btn-retry{margin-top:12px;padding:12px 48px;font-size:16px;font-weight:700;color:#000;background:linear-gradient(135deg,#0ff,#06f);border:none;border-radius:30px;cursor:pointer;pointer-events:auto;letter-spacing:2px;box-shadow:0 4px 20px rgba(0,180,255,.5);}
#btn-menu{margin-top:8px;padding:10px 36px;font-size:13px;font-weight:600;color:#0cf;background:transparent;border:1px solid rgba(0,200,255,.3);border-radius:30px;cursor:pointer;pointer-events:auto;letter-spacing:2px;}

/* 成就弹窗 */
#achievement-popup{position:fixed;top:-80px;left:50%;transform:translateX(-50%);z-index:40;background:rgba(10,10,40,.95);border:2px solid #ff0;border-radius:12px;padding:10px 20px;display:none;text-align:center;pointer-events:none;box-shadow:0 0 30px rgba(255,200,0,.3);transition:top .4s cubic-bezier(.22,1,.36,1);}
#achievement-popup.show{display:block;top:20px;}
#achievement-popup .ach-icon{font-size:28px;}
#achievement-popup .ach-title{color:#ff0;font-size:14px;font-weight:700;margin:4px 0;}
#achievement-popup .ach-desc{color:rgba(255,255,255,.6);font-size:11px;}

/* 每日任务 */
#daily-missions{position:fixed;right:10px;bottom:80px;z-index:15;pointer-events:none;display:flex;flex-direction:column;gap:4px;}
.mission-item{background:rgba(10,10,40,.8);border:1px solid rgba(0,200,255,.2);border-radius:8px;padding:4px 10px;font-size:10px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:6px;transition:all .3s;}
.mission-item.complete{color:#0f0;border-color:#0f0;}
.mission-item .m-progress{color:#0cf;font-weight:700;min-width:24px;text-align:right;}

/* 社交分享提示 */
#share-hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:35;background:rgba(0,200,255,.15);border:1px solid rgba(0,200,255,.4);border-radius:20px;padding:8px 20px;font-size:12px;color:#0cf;display:none;text-align:center;pointer-events:auto;cursor:pointer;animation:sharePulse 2s ease-in-out infinite;}
@keyframes sharePulse{0%,100%{box-shadow:0 0 10px rgba(0,200,255,.2)}50%{box-shadow:0 0 20px rgba(0,200,255,.5)}}

/* 教程遮罩 */
#tutorial{position:fixed;inset:0;z-index:25;background:rgba(0,0,0,.7);display:none;flex-direction:column;align-items:center;justify-content:center;}
.tut-text{color:#fff;font-size:16px;text-align:center;line-height:2;padding:20px;}
.tut-arrow{font-size:48px;animation:tutBounce .8s ease-in-out infinite;}
@keyframes tutBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
#tut-skip{position:absolute;top:20px;right:20px;color:rgba(255,255,255,.5);font-size:14px;padding:8px 16px;border:1px solid rgba(255,255,255,.3);border-radius:20px;cursor:pointer;pointer-events:auto;}

/* 音效开关 */
#btn-sfx{position:fixed;top:10px;right:70px;z-index:40;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:18px;cursor:pointer;pointer-events:auto;display:flex;align-items:center;justify-content:center;transition:background .3s;}
#btn-sfx:hover{background:rgba(0,200,255,.2);}
#btn-sfx.muted{opacity:.5;}

/* 剧情对话框 */
#story-box{position:fixed;top:-120px;left:50%;transform:translateX(-50%);z-index:45;background:rgba(5,5,30,.95);border:1px solid rgba(0,200,255,.4);border-radius:12px;padding:12px 20px;min-width:260px;max-width:340px;pointer-events:none;transition:top .5s cubic-bezier(.22,1,.36,1);box-shadow:0 0 30px rgba(0,150,255,.2);}
#story-box.show{top:50px;}
#story-box .story-speaker{font-size:11px;color:#0cf;font-weight:700;letter-spacing:2px;margin-bottom:4px;}
#story-box .story-text{font-size:13px;color:rgba(255,255,255,.85);line-height:1.6;min-height:20px;}
#story-box .story-text .char{opacity:0;animation:charIn .05s forwards;}
@keyframes charIn{to{opacity:1;}}
#story-box .story-arrow{position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid rgba(0,200,255,.4);}

/* 排行榜弹窗 */
#leaderboard-overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);display:none;flex-direction:column;align-items:center;justify-content:center;}
.lb-panel{background:rgba(10,10,40,.95);border:1px solid rgba(0,200,255,.4);border-radius:20px;padding:24px;text-align:center;box-shadow:0 0 80px rgba(0,150,255,.25);min-width:300px;max-width:400px;max-height:80vh;overflow-y:auto;pointer-events:auto;animation:panelIn .3s ease-out;}
.lb-title{font-size:22px;font-weight:900;color:#fff;letter-spacing:4px;margin-bottom:4px;}
.lb-subtitle{font-size:11px;color:rgba(0,200,255,.6);letter-spacing:2px;margin-bottom:16px;}
.lb-table{width:100%;border-collapse:collapse;}
.lb-table th{font-size:10px;color:rgba(0,200,255,.7);padding:6px 4px;border-bottom:1px solid rgba(0,200,255,.2);text-align:center;font-weight:600;letter-spacing:1px;}
.lb-table td{font-size:12px;color:rgba(255,255,255,.75);padding:7px 4px;text-align:center;border-bottom:1px solid rgba(255,255,255,.05);}
.lb-table .lb-rank{font-weight:900;font-size:14px;}
.lb-table .lb-rank-1{color:#FD0;text-shadow:0 0 8px rgba(255,221,0,.6);}
.lb-table .lb-rank-2{color:#ccc;text-shadow:0 0 6px rgba(200,200,200,.4);}
.lb-table .lb-rank-3{color:#d80;text-shadow:0 0 6px rgba(210,130,0,.4);}
.lb-table .lb-current{background:rgba(0,200,255,.08);border-radius:4px;}
.lb-table .lb-current td{color:#0ff;font-weight:700;}
.lb-empty{color:rgba(255,255,255,.4);font-size:13px;padding:20px 0;}
.lb-close{margin-top:16px;padding:10px 36px;font-size:13px;font-weight:600;color:#0cf;background:transparent;border:1px solid rgba(0,200,255,.3);border-radius:30px;cursor:pointer;pointer-events:auto;letter-spacing:2px;transition:all .2s;}
.lb-close:hover{background:rgba(0,200,255,.1);border-color:rgba(0,200,255,.6);}
#btn-leaderboard{margin-top:6px;padding:8px 28px;font-size:13px;font-weight:600;color:#FD0;background:transparent;border:1px solid rgba(255,221,0,.3);border-radius:30px;cursor:pointer;pointer-events:auto;letter-spacing:2px;transition:all .2s;}
#btn-leaderboard:hover{background:rgba(255,221,0,.1);border-color:rgba(255,221,0,.6);}

/* 结算面板内排行榜 */
.go-lb{margin-top:16px;border-top:1px solid rgba(0,200,255,.15);padding-top:12px;}
.go-lb-title{font-size:13px;color:#FD0;font-weight:700;letter-spacing:2px;margin-bottom:8px;}
.go-lb-table{width:100%;border-collapse:collapse;}
.go-lb-table th{font-size:9px;color:rgba(0,200,255,.5);padding:3px 2px;border-bottom:1px solid rgba(0,200,255,.1);text-align:center;}
.go-lb-table td{font-size:10px;color:rgba(255,255,255,.6);padding:4px 2px;text-align:center;border-bottom:1px solid rgba(255,255,255,.03);}
.go-lb-table .go-lb-rank{font-weight:700;font-size:11px;}
.go-lb-table .go-rank-1{color:#FD0;}
.go-lb-table .go-rank-2{color:#ccc;}
.go-lb-table .go-rank-3{color:#d80;}
.go-lb-table .go-lb-current td{color:#0ff;font-weight:700;background:rgba(0,200,255,.06);}

@media(max-width:480px){
  .menu-title{font-size:30px;letter-spacing:5px}
  .logo-icon{width:70px;height:70px}
  .go-panel{padding:24px;margin:0 20px;}
  #achievement-popup.show{top:10px;}
  #story-box{min-width:220px;max-width:300px;padding:10px 16px;}
  #story-box .story-text{font-size:12px;}
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- 开始菜单 -->
<div id="menu">
  <div id="menu-bg"></div>
  <div class="menu-glow"></div>
  <div id="menu-inner">
    <div class="logo-icon">
      <div class="logo-pulse"></div>
      <div class="logo-kite">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- 星际风筝主体 -->
          <defs>
            <linearGradient id="kiteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#0ff;stop-opacity:1"/>
              <stop offset="50%" style="stop-color:#06f;stop-opacity:1"/>
              <stop offset="100%" style="stop-color:#80f;stop-opacity:1"/>
            </linearGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="2" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <!-- 风筝菱形主体 -->
          <polygon points="50,10 80,50 50,85 20,50" fill="url(#kiteGrad)" opacity="0.8" filter="url(#glow)"/>
          <!-- 中心能量核 -->
          <circle cx="50" cy="50" r="8" fill="#fff" opacity="0.9">
            <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2s" repeatCount="indefinite"/>
          </circle>
          <!-- 十字能量线 -->
          <line x1="50" y1="10" x2="50" y2="85" stroke="#0ff" stroke-width="1.5" opacity="0.6"/>
          <line x1="20" y1="50" x2="80" y2="50" stroke="#0ff" stroke-width="1.5" opacity="0.6"/>
          <!-- 四角光点 -->
          <circle cx="50" cy="10" r="3" fill="#0ff" opacity="0.8">
            <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
          </circle>
          <circle cx="80" cy="50" r="3" fill="#06f" opacity="0.8">
            <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.5s" repeatCount="indefinite"/>
          </circle>
          <circle cx="50" cy="85" r="3" fill="#80f" opacity="0.8">
            <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite"/>
          </circle>
          <circle cx="20" cy="50" r="3" fill="#f0f" opacity="0.8">
            <animate attributeName="opacity" values="0.2;0.8;0.2" dur="1.5s" repeatCount="indefinite"/>
          </circle>
          <!-- 外圈轨道 -->
          <ellipse cx="50" cy="50" rx="42" ry="42" fill="none" stroke="#0ff" stroke-width="0.5" opacity="0.3" stroke-dasharray="4 4">
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="8s" repeatCount="indefinite"/>
          </ellipse>
        </svg>
      </div>
    </div>
    <div class="menu-title">星际风筝传说</div>
    <div class="menu-title-en">STAR KITE LEGEND</div>
    <div class="menu-sub">操控风筝穿越星际<br>点击射击 · 滑动移动 · 收集道具</div>
    <div id="skin-selector"></div>
    <div class="diff-label">⚙️ 难度选择</div>
    <div id="difficulty-selector"></div>
    <button id="btn-start" onclick="startGame()">▶ 开始飞行</button>
    <button id="btn-leaderboard" onclick="showLeaderboard()">🏆 排行榜</button>
    <div class="menu-stats" id="menu-stats"></div>
    <div class="menu-hint">触屏：拖拽移动 / 点击射击<br>键盘：← → 移动 / 空格射击 / B 炸弹</div>
  </div>
</div>

<!-- 结算面板 -->
<div id="gameover">
  <div class="go-panel">
    <div class="go-title" id="go-title">坠落了...</div>
    <div class="go-sub" id="go-cause">被击中了</div>
    <div class="go-stat"><span>最高高度</span><span id="go-height">0m</span></div>
    <div class="go-stat"><span>总得分</span><span id="go-score">0</span></div>
    <div class="go-stat"><span>击杀数</span><span id="go-kills">0</span></div>
    <div class="go-stat"><span>最大连击</span><span id="go-combo">0</span></div>
    <div class="go-coins">🪙 +<span id="go-coins">0</span></div>
    <div id="go-newRecord" style="display:none;color:#0ff;font-weight:700;font-size:13px;animation:blink .5s infinite;margin-bottom:8px;">🏆 新纪录！</div>
    <div id="go-share" style="display:none;margin-bottom:8px;"></div>
    <div class="go-lb" id="go-lb" style="display:none;">
      <div class="go-lb-title">🏆 排行榜 TOP 10</div>
      <table class="go-lb-table"><thead><tr><th>#</th><th>分数</th><th>高度</th><th>击杀</th><th>日期</th></tr></thead>
      <tbody id="go-lb-tbody"></tbody></table>
    </div>
    <button id="btn-retry" onclick="startGame()">🔄 再来一局</button>
    <button id="btn-menu" onclick="backToMenu()">🏠 返回首页</button>
  </div>
</div>

<!-- 成就弹窗 -->
<div id="achievement-popup"><div class="ach-icon"></div><div class="ach-title"></div><div class="ach-desc"></div></div>

<!-- 剧情对话框 -->
<div id="story-box">
  <div class="story-speaker"></div>
  <div class="story-text"></div>
  <div class="story-arrow"></div>
</div>

<!-- 排行榜弹窗 -->
<div id="leaderboard-overlay" onclick="closeLeaderboard()">
  <div class="lb-panel" onclick="event.stopPropagation()">
    <div class="lb-title">🏆 排行榜</div>
    <div class="lb-subtitle">TOP 10 — 星际风筝传说</div>
    <table class="lb-table"><thead><tr><th>排名</th><th>分数</th><th>高度</th><th>击杀</th><th>日期</th></tr></thead>
    <tbody id="lb-tbody"><tr><td colspan="5" class="lb-empty">暂无记录，快去飞行吧！</td></tr></tbody></table>
    <button class="lb-close" onclick="closeLeaderboard()">关闭</button>
  </div>
</div>

<!-- 教程 -->
<div id="tutorial" onclick="closeTutorial()">
  <div id="tut-skip" onclick="event.stopPropagation();closeTutorial();">跳过</div>
  <div class="tut-text">🚀 星际风筝自动射击<br>👆 拖拽屏幕控制方向<br>💣 按 B 键释放炸弹<br>🌟 收集道具变强</div>
  <div class="tut-arrow">🌌</div>
</div>

<!-- 音效开关 -->
<button id="btn-sfx" onclick="toggleSfx()" title="音效/BGM">🔊</button>

<script>
// ============================================================
// 星际风筝传说 v3 — Tier 1-3 全面升级
// 基于 Raiden 雷电 × 独立游戏果汁设计
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.style.imageRendering = 'auto';
let W, H;
let lastTime=0, dt=0;
let gameRunning=false;
let frameCount=0;

// 持久化数据
const SAVE = {
  get(k,d){ try{const v=localStorage.getItem('kite_'+k);return v?JSON.parse(v):d;}catch(e){return d;} },
  set(k,v){ try{localStorage.setItem('kite_'+k,JSON.stringify(v));}catch(e){} }
};
let totalCoins = SAVE.get('coins',0);
let recordHeight = SAVE.get('record',0);
let totalKills = SAVE.get('kills',0);
let gamesPlayed = SAVE.get('games',0);
let currentSkin = SAVE.get('skin',0);
let currentDifficulty = SAVE.get('difficulty','normal');
let achievements = SAVE.get('achievements',[]);
let hasPlayedTutorial = SAVE.get('tutorial',false);

// 难度配置
const DIFFICULTIES = {
  easy: {
    name:'简单', desc:'休闲飞行', color:'#0f0',
    spawnMin:.6, spawnMax:1.4, speedMult:.75, bossHP:30, bossInterval:650,
    bulletSpeedMult:.7, startBombs:5, enemyProbs:[.6,.25,.15],
    spawnCount:1, shootRateMult:1.5, hp:5

// ==================== 动态难度递进 ====================
function getDynamicScale(){
  // 随高度增加难度系数: 基础1x, 每2000米+0.5x, 上限4x
  return Math.min(4, 1 + heightM / 2000);
}

function getDynamicSpawnMin(){
  return Math.max(0.02, diffCfg.spawnMin / getDynamicScale());
}
function getDynamicSpawnMax(){
  return Math.max(0.04, diffCfg.spawnMax / getDynamicScale());
}
function getDynamicBulletSpeed(){
  return diffCfg.bulletSpeedMult * Math.min(2.5, 1 + heightM * 0.00025); // 每1000米+25%，上限2.5x
}
function getDynamicEnemyHP(baseHP){
  return Math.floor(baseHP * Math.min(4, 1 + heightM * 0.0003)); // 每1000米+30%，上限4x
}
function getDynamicBossHP(){
  return Math.floor(diffCfg.bossHP * Math.min(3.5, 1 + heightM * 0.0002)); // 每1000米+20%，上限3.5x
}
function getDynamicSpawnCount(){
  const base=diffCfg.spawnCount;
  const extra=Math.floor(heightM/1500); // 每1500米+1
  return base + extra;
}

function getDailyMissions(){
  const today = new Date().toISOString().split('T')[0];
  const saved = SAVE.get('daily',{});
  if(saved.date!==today){
    const templates = [
      {desc:'击杀50个敌人', need:50, type:'kills'},
      {desc:'飞到800m', need:800, type:'height'},
      {desc:'打出10连击', need:10, type:'combo'},
      {desc:'收集20个金币', need:20, type:'coin'},
      {desc:'击杀1个Boss', need:1, type:'boss'},
      {desc:'使用3次炸弹', need:3, type:'bomb'},
      {desc:'收集5个能量胶囊', need:5, type:'weapon'},
      {desc:'得5000分', need:5000, type:'score'},
    ];
    const chosen = [];
    const idx = new Set();
    while(chosen.length<3){
      const i = Math.floor(Math.random()*templates.length);
      if(!idx.has(i)){idx.add(i);chosen.push({...templates[i], progress:0, done:false});}
    }
    return {date:today, missions:chosen};
  }
  return saved;
}

// ==================== 粒子系统 ====================
class Particle {
  constructor(x,y,vx,vy,life,color,size=2){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.life=life;this.maxLife=life;
    this.color=color;this.size=size;this.rot=Math.random()*Math.PI*2;
  }
  update(dt){
    this.x+=this.vx*dt;this.y+=this.vy*dt;
    this.life-=dt;this.vx*=.98;this.vy*=.98;
  }
  get alpha(){return Math.max(0,this.life/this.maxLife);}
  get alive(){return this.life>0;}
}

function spawnParticles(x,y,count,color,spread=100,life=0.6,size=2){
  for(let i=0;i<count;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=Math.random()*spread*2+spread;
    particles.push(new Particle(x,y,Math.cos(ang)*spd,Math.sin(ang)*spd,life+Math.random()*.3,color,size+Math.random()*2));
  }
}

      storyCharIndex++;
      setTimeout(typeChar,40);
    } else {
      storyTyping=false;
      // 自动关闭
      setTimeout(()=>{box.classList.remove('show');},(duration-.5)*1000);
    }
  }
  typeChar();
}

function queueStory(storyArray,callback){
  // storyArray: [{speaker,text,delay}]
  let cumDelay=0;
  storyArray.forEach((item,i)=>{
    cumDelay+=item.delay||0;
    setTimeout(()=>{
      showStory(item.speaker,item.text,3);
      if(i===storyArray.length-1&&callback) setTimeout(callback,3500);
    },cumDelay*1000);
  });
}

function checkStoryTrigger(heightM){
  // 高度剧情触发
  const milestones=[100,500,1000,1500,2000,3000,4000,5000];
  for(const m of milestones){
    if(heightM>=m&&!storyTriggered.has('height'+m)){
      storyTriggered.add('height'+m);
      const key='height'+m;
      if(STORY_DATA[key]){
        showStory(STORY_DATA[key].speaker,STORY_DATA[key].text,3.5);
        return;
      }
    }
  }
}

// ==================== 音效系统 (Web Audio API) ====================
let audioCtx=null, bgmGain=null, bgmActive=false, sfxMuted=false;
function initAudio(){
  if(audioCtx) return;
  try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return;}
  bgmGain=audioCtx.createGain();bgmGain.gain.value=0;bgmGain.connect(audioCtx.destination);
}
function playTone(freq,dur,type='square',vol=.12,detune=0){
  if(!audioCtx||sfxMuted) return;
  const t=audioCtx.currentTime;
  const osc=audioCtx.createOscillator();const g=audioCtx.createGain();
  osc.type=type;osc.frequency.setValueAtTime(freq,t);if(detune)osc.detune.setValueAtTime(detune,t);
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
  osc.connect(g);g.connect(audioCtx.destination);
  osc.start(t);osc.stop(t+dur);
}
function playNoise(dur,vol=.08,lpFreq=800){
  if(!audioCtx||sfxMuted) return;
  const t=audioCtx.currentTime,bufferSize=audioCtx.sampleRate*dur;
  const buf=audioCtx.createBuffer(1,bufferSize,audioCtx.sampleRate);
  const data=buf.getChannelData(0);for(let i=0;i<bufferSize;i++) data[i]=Math.random()*2-1;
  const src=audioCtx.createBufferSource();src.buffer=buf;
  const lp=audioCtx.createBiquadFilter();lp.type='lowpass';lp.frequency.setValueAtTime(lpFreq,t);lp.frequency.exponentialRampToValueAtTime(200,t+dur);
  const g=audioCtx.createGain();g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);
  src.connect(lp);lp.connect(g);g.connect(audioCtx.destination);
  src.start(t);src.stop(t+dur);
}
const SFX={
  shoot(){playTone(800,.04,'square',.06);playTone(1200,.03,'square',.04,50);},
  hit(freq=300){playTone(freq,.06,'sawtooth',.08);playNoise(.04,.03,1500);},
  explode(){playNoise(.25,.12,400);playTone(80,.2,'sine',.15);},
  pickup(){playTone(600,.06,'square',.06);setTimeout(()=>playTone(900,.08,'square',.07),40);},
  bomb(){playNoise(.5,.15,200);playTone(50,.4,'sine',.2);},
  bossWarning(){playTone(120,.3,'sawtooth',.1);setTimeout(()=>playTone(160,.3,'sawtooth',.1),200);},
  die(){playNoise(.4,.1,300);playTone(60,.3,'sine',.15);playTone(40,.5,'sawtooth',.08);},
  achievement(){playTone(523,.1,'square',.06);setTimeout(()=>playTone(659,.1,'square',.06),100);setTimeout(()=>playTone(784,.15,'square',.07),200);},
  fever(){playTone(440,.08,'square',.05);setTimeout(()=>playTone(554,.08,'square',.05),60);setTimeout(()=>playTone(659,.08,'square',.05),120);setTimeout(()=>playTone(880,.12,'square',.06),180);},
  combo(c){playTone(400+c*30,.08,'square',Math.min(.1,c*.01));},
};

// BGM - 简单循环低音 + 琶音（动态速度）
let bgmNoteIdx=0, bgmTimeout=null;
const BGM_NOTES=[65.41,73.42,82.41,98.00,110.00,98.00,82.41,73.42];
function bgmTick(){
  if(!bgmActive||!audioCtx) return;
  if(gameRunning||deathSlowMo>0){
    const t=audioCtx.currentTime;
    const osc=audioCtx.createOscillator();
    osc.type='triangle';osc.frequency.setValueAtTime(BGM_NOTES[bgmNoteIdx%8],t);
    const g=audioCtx.createGain();g.gain.setValueAtTime(.015,t);g.gain.exponentialRampToValueAtTime(.001,t+.35);
    osc.connect(g);g.connect(audioCtx.destination);
    osc.start(t);osc.stop(t+.35);
    if(bgmNoteIdx%2===0){playNoise(.08,.02,2000);}
    bgmNoteIdx++;
  }
  const tempo=Math.max(150,400-heightM*.5);
  bgmTimeout=setTimeout(bgmTick,tempo);
}
function startBGM(){
  if(!audioCtx||bgmActive) return;
  bgmActive=true;bgmNoteIdx=0;
  bgmGain.gain.linearRampToValueAtTime(.04,audioCtx.currentTime+1);
  bgmTimeout=setTimeout(bgmTick,400);
}
function stopBGM(){
  bgmActive=false;
  if(bgmTimeout){clearTimeout(bgmTimeout);bgmTimeout=null;}
  if(bgmGain) bgmGain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+.5);
}

}

function drawPlayer(p){
  ctx.save();
  ctx.translate(p.x,p.y);
  // 挤压拉伸
  const sx=p.squashX+(1-p.squashX)*0.15;
  const sy=p.squashY+(1-p.squashY)*0.15;
  ctx.scale(sx,sy);
  // 无敌闪烁/受击闪白
  if(p.invincible>0&&Math.floor(p.invincible*20)%2===0) ctx.globalAlpha=0.4;
  if(p.damageFlash>0){
    ctx.globalAlpha=1;
    ctx.fillStyle='rgba(255,0,0,0.3)';
    ctx.beginPath();ctx.arc(0,0,28,0,Math.PI*2);ctx.fill();
    // 受击红框
    ctx.strokeStyle='rgba(255,0,0,0.6)';
    ctx.lineWidth=2;ctx.strokeRect(-20,-24,40,48);
  }

  // 护盾光环
  if(p.shieldTimer>0){
    ctx.beginPath();ctx.arc(0,0,30,0,Math.PI*2);
    ctx.strokeStyle=`rgba(0,255,255,${.5+Math.sin(frameCount*.2)*.3})`;
    ctx.lineWidth=2;ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,35,0,Math.PI*2);
    ctx.strokeStyle=`rgba(0,180,255,${.3+Math.sin(frameCount*.3)*.2})`;
    ctx.lineWidth=1;ctx.stroke();
  }
  // 磁铁光环
  if(p.magnetTimer>0){
    ctx.beginPath();ctx.arc(0,0,p.magnetRange,0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,200,0,${.15+Math.sin(frameCount*.15)*.1})`;
    ctx.lineWidth=1;ctx.setLineDash([8,12]);ctx.stroke();ctx.setLineDash([]);
  }

  const skin=SKINS[currentSkin];
  
  // 皮肤颜色
  let bodyColor1=skin.color==='#f80'?'#3a1a05':(skin.color==='#90f'?'#1a053a':(skin.color==='#FD0'?'#3a3005':'#1a1a3e'));
  let bodyColor2=skin.color==='#f80'?'#1a0d05':(skin.color==='#90f'?'#0d0530':(skin.color==='#FD0'?'#2a2005':'#0d1a3d'));
  
  // 主体：流线型战机风筝
  ctx.beginPath();
  ctx.moveTo(0,-24);ctx.lineTo(16,-4);ctx.lineTo(22,8);ctx.lineTo(14,18);
  ctx.lineTo(0,24);ctx.lineTo(-14,18);ctx.lineTo(-22,8);ctx.lineTo(-16,-4);
  ctx.closePath();
  const grad=ctx.createLinearGradient(0,-24,0,24);
  grad.addColorStop(0,bodyColor1);grad.addColorStop(.3,bodyColor2);
  grad.addColorStop(.7,'#152040');grad.addColorStop(1,'#1a2040');
  ctx.fillStyle=grad;ctx.fill();
  ctx.strokeStyle=skin.color;ctx.lineWidth=2;
  ctx.shadowColor=skin.color;ctx.shadowBlur=12;ctx.stroke();ctx.shadowBlur=0;

  // 电路纹理
  ctx.strokeStyle='rgba(0,200,255,0.3)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(0,18);ctx.stroke();
  ctx.strokeStyle='rgba(0,200,255,0.2)';
  ctx.beginPath();ctx.moveTo(-10,-6);ctx.lineTo(10,-6);
  ctx.moveTo(-12,6);ctx.lineTo(12,6);ctx.stroke();

  // 中央能量核心
  const core=ctx.createRadialGradient(0,0,0,0,0,10);
  core.addColorStop(0,'rgba(0,255,255,0.8)');core.addColorStop(.4,'rgba(0,180,255,0.4)');
  core.addColorStop(1,'rgba(0,100,255,0)');
  ctx.fillStyle=core;ctx.beginPath();ctx.arc(0,0,12,0,Math.PI*2);ctx.fill();

  // 机翼能量纹
  ctx.strokeStyle='rgba(0,255,200,0.5)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(18,6);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-10,0);ctx.lineTo(-18,6);ctx.stroke();

  // 离子推进尾焰
  const trailLen=30+Math.sin(frameCount*.3)*8;
  const trailGrad=ctx.createLinearGradient(0,20,0,20+trailLen);
  trailGrad.addColorStop(0,'rgba(0,220,255,0.9)');trailGrad.addColorStop(.3,'rgba(0,150,255,0.5)');
  trailGrad.addColorStop(.7,'rgba(0,80,255,0.15)');trailGrad.addColorStop(1,'rgba(0,30,255,0)');
  ctx.fillStyle=trailGrad;
  ctx.beginPath();ctx.moveTo(-6,20);ctx.lineTo(6,20);ctx.lineTo(14,20+trailLen);ctx.lineTo(-14,20+trailLen);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(0,150,255,0.3)';
  ctx.beginPath();ctx.moveTo(-6,20);ctx.lineTo(0,20);ctx.lineTo(-8,20+trailLen*.8);ctx.lineTo(-16,20+trailLen*.7);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(0,20);ctx.lineTo(6,20);ctx.lineTo(16,20+trailLen*.7);ctx.lineTo(8,20+trailLen*.8);ctx.closePath();ctx.fill();

  // 武器等级发光点
  const wingGlow=l=>{ctx.fillStyle='rgba(0,255,255,0.7)';ctx.shadowColor='#0ff';ctx.shadowBlur=6;ctx.beginPath();ctx.arc(l,0,2.5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;};
  if(weaponLevel>=1){wingGlow(0)}
  if(weaponLevel>=2){wingGlow(16);wingGlow(-16)}
  if(weaponLevel>=3){wingGlow(8);wingGlow(-8)}

  // 集中模式：显示命中点（3px小点）
  if(isFocus){
    ctx.fillStyle='#0ff';ctx.shadowColor='#0ff';ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    // 命中点外圈脉冲
    const pRadius=4+Math.sin(frameCount*.3)*1.5;
    ctx.strokeStyle='rgba(0,255,255,0.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(0,0,pRadius,0,Math.PI*2);ctx.stroke();
  }

  ctx.restore();
}

function shoot(p){
  const cfg=WEAPON_TYPES[weaponType]; if(!cfg) return;
  const lvl=cfg.levels[Math.min(weaponLevel-1, cfg.levels.length-1)];
  const ty=p.y-24;
  if(weaponType==='spread'){
    const halfSpread=lvl.spread*(lvl.count-1)/2;
    for(let i=0;i<lvl.count;i++){
      const a=-Math.PI/2-halfSpread+(i/(lvl.count-1||1))*halfSpread*2;
      playerBullets.push({x:p.x,y:ty,vx:Math.cos(a)*lvl.speed,vy:Math.sin(a)*lvl.speed,type:'spread',life:lvl.life,alive:true});
    }
  } else if(weaponType==='laser'){
    // 激光束 — 即时判定 + 短暂持续渲染
    playerBullets.push({x:p.x,y:ty,l:lvl.length,w:lvl.width,dmg:lvl.dmg,type:'laser',life:lvl.life,alive:true,hitThisFrame:new Set()});
  } else if(weaponType==='refract'){
    for(let i=0;i<lvl.count;i++){
      const a=-Math.PI/2+(i-(lvl.count-1)/2)*.12;
      playerBullets.push({x:p.x+i*4-(lvl.count-1)*2,y:ty,vx:Math.cos(a)*lvl.speed,vy:Math.sin(a)*lvl.speed,type:'refract',bounces:lvl.bounces,life:lvl.life,alive:true});
    }
  } else if(weaponType==='homing'){
    // 先找最近的敌人确定初始方向
    let targetA=-Math.PI/2;
    let minD=9999;
    enemies.forEach(e=>{const d=Math.hypot(e.x-p.x,e.y-ty);if(d<minD){minD=d;targetA=Math.atan2(e.y-ty,e.x-p.x);}});
    for(let i=0;i<lvl.count;i++){
      const a=targetA+(i-(lvl.count-1)/2)*.25;
      playerBullets.push({x:p.x+i*6-(lvl.count-1)*3,y:ty,vx:Math.cos(a)*lvl.speed,vy:Math.sin(a)*lvl.speed,type:'homing',speed:lvl.speed,turnRate:lvl.turnRate,life:lvl.life,alive:true});
    }
  }
  SFX.shoot();
}
function drawPlayerBullet(b){
  ctx.save();ctx.translate(b.x,b.y);
  if(b.type==='laser'){
    // 激光束 — 从当前位置向上画
    const g=ctx.createLinearGradient(0,0,0,-b.l);
    g.addColorStop(0,'#fff');g.addColorStop(.15,'#f44');g.addColorStop(.5,'#f22');g.addColorStop(1,'rgba(255,0,0,0)');
    ctx.fillStyle=g;ctx.fillRect(-b.w/2,-b.l,b.w,b.l);
    ctx.shadowColor='#f44';ctx.shadowBlur=12;
    ctx.fillStyle='rgba(255,80,80,0.6)';ctx.fillRect(-1,-b.l,2,b.l);
    ctx.shadowBlur=0;
    // 光束核心白线
    ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-b.l);ctx.stroke();
  } else if(b.type==='refract'){
    // 折射弹 — 绿色六边形
    ctx.shadowColor='#0f0';ctx.shadowBlur=10;
    ctx.fillStyle='#0f0';ctx.beginPath();
    for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6,r=6;if(i===0)ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
    ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,0,2.5,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // 尾迹
    ctx.fillStyle='rgba(0,255,0,0.3)';ctx.fillRect(-2,0,4,6);
  } else if(b.type==='homing'){
    // 追踪弹 — 黄色导弹形状
    ctx.shadowColor='#ff0';ctx.shadowBlur=8;
    ctx.fillStyle='#ff0';ctx.beginPath();ctx.moveTo(0,-8);ctx.lineTo(4,0);ctx.lineTo(2,8);ctx.lineTo(-2,8);ctx.lineTo(-4,0);ctx.closePath();ctx.fill();
    ctx.fillStyle='#f80';ctx.beginPath();ctx.arc(0,0,3,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // 尾焰
    ctx.fillStyle='rgba(255,136,0,0.4)';ctx.fillRect(-1.5,4,3,5);
  } else {
    // spread — 原始青色子弹
    const grad=ctx.createLinearGradient(0,8,0,-8);
    grad.addColorStop(0,'#fff');grad.addColorStop(.4,'#0ff');grad.addColorStop(1,'rgba(0,200,255,0)');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(3,-2);ctx.lineTo(3,6);ctx.lineTo(0,8);ctx.lineTo(-3,6);ctx.lineTo(-3,-2);ctx.closePath();ctx.fill();
    ctx.shadowColor='#0ff';ctx.shadowBlur=8;
    ctx.fillStyle='rgba(0,255,255,0.4)';ctx.fillRect(-1,-8,2,14);ctx.shadowBlur=0;
    if(Math.random()<.3) particles.push(new Particle(b.x,b.y+6,0,130,0.2,'#0cf',1.5));
  }
  ctx.restore();
}

  if(type==='boss'){
    const titlePool=zone.bossTitlePool.length>0?zone.bossTitlePool:BOSS_TITLES;
    obj.title=titlePool[Math.floor(Math.random()*titlePool.length)];
    obj.bossType=zone.theme; // 标记Boss类型用于弹幕选择
  }
  return obj;
}

function drawHeartPath(x,y,s){
  const cx=x+s/2,cy=y+s/4;
  ctx.beginPath();
  ctx.moveTo(cx,y+s*.9);
  ctx.bezierCurveTo(x-s*.3,y+s*.45,x-s*.2,y,x,y);
  ctx.bezierCurveTo(x+s*.2,y,x+s*.3,y+s*.45,cx,y+s*.9);
}

function drawHeart(x,y,s,color){
  ctx.fillStyle=color;
  drawHeartPath(x,y,s);ctx.fill();
}

function drawEnemy(e){
  ctx.save();ctx.translate(e.x,e.y);
  const hpRatio=e.hp/e.maxHp;
  const bc=e.bodyColor||'#3a0a0a';
  const sc=e.strokeColor||'#f44';
  const cc=e.coreColor||'#f66';

  // 受击闪白
  if(e.flashTimer>0){ctx.globalAlpha=1;ctx.fillStyle='#fff';e.flashTimer-=dt;}
  
  if(e.type==='boss'){
    // Boss攻击预警
    if(e.telegraphTimer>0){
      ctx.fillStyle=`rgba(${parseColor(sc)},0.25)`;
      ctx.beginPath();ctx.arc(0,0,e.w*.9,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=`rgba(${parseColor(sc)},0.5)`;ctx.lineWidth=2;ctx.setLineDash([6,3]);
      ctx.beginPath();ctx.arc(0,0,e.w*.85,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
    }
    // Boss主体 - 根据区域主题变化
    const topC=sc; // stroke色用于上面
    const bg=ctx.createLinearGradient(0,-45,0,45);
    bg.addColorStop(0,bc);bg.addColorStop(.5,sc);bg.addColorStop(1,bc);
    ctx.fillStyle=bg;
    // 不同区域Boss外形
    const zone=e.zone||'corporate';
    if(zone==='military'){
      // 军事风格：八角形战舰
      ctx.beginPath();
      for(let i=0;i<8;i++){
        const a=i*Math.PI/4-Math.PI/8;
        const r=i%2===0?42:32;
        const px=Math.cos(a)*r,py=Math.sin(a)*r;
        if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }
      ctx.closePath();ctx.fill();
      ctx.strokeStyle=sc;ctx.lineWidth=3;ctx.shadowColor=sc;ctx.shadowBlur=20;ctx.stroke();ctx.shadowBlur=0;
    } else if(zone==='alien'){
      // 外星风格：不规则多边体
      ctx.beginPath();
      ctx.moveTo(0,-44);ctx.lineTo(20,-30);ctx.lineTo(38,-10);ctx.lineTo(34,10);
      ctx.lineTo(42,20);ctx.lineTo(20,38);ctx.lineTo(-10,40);ctx.lineTo(-35,20);
      ctx.lineTo(-40,-5);ctx.lineTo(-25,-25);ctx.closePath();
      ctx.fill();
      ctx.strokeStyle=sc;ctx.lineWidth=3;ctx.shadowColor=sc;ctx.shadowBlur=25;ctx.stroke();ctx.shadowBlur=0;
      // 异星触手
      for(let i=0;i<4;i++){
        const a=i*Math.PI/2+frameCount*.03;
        ctx.strokeStyle=sc;ctx.lineWidth=1.5;ctx.globalAlpha=.4;
        ctx.beginPath();ctx.moveTo(Math.cos(a)*30,Math.sin(a)*25);
        ctx.lineTo(Math.cos(a)*52,Math.sin(a)*42);ctx.stroke();
        ctx.globalAlpha=1;
      }
    } else if(zone==='cosmic'){
      // 宇宙风格：旋转椭圆体
      ctx.beginPath();
      ctx.ellipse(0,0,42,38,frameCount*.01,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=sc;ctx.lineWidth=3;ctx.shadowColor=sc;ctx.shadowBlur=30;ctx.stroke();ctx.shadowBlur=0;
      // 光环
      ctx.beginPath();ctx.ellipse(0,0,50,20,frameCount*.02,0,Math.PI*2);
      ctx.strokeStyle=sc;ctx.lineWidth=1.5;ctx.globalAlpha=.5;ctx.stroke();ctx.globalAlpha=1;
    } else if(zone==='void'){
      // 虚空风格：碎片几何体
      ctx.beginPath();
      ctx.moveTo(0,-45);ctx.lineTo(28,-25);ctx.lineTo(42,0);ctx.lineTo(25,30);
      ctx.lineTo(-25,35);ctx.lineTo(-42,5);ctx.lineTo(-30,-20);ctx.closePath();
      ctx.fill();
      ctx.strokeStyle=sc;ctx.lineWidth=2;ctx.setLineDash([10,5]);ctx.shadowColor='#fff';ctx.shadowBlur=35;ctx.stroke();ctx.setLineDash([]);ctx.shadowBlur=0;
      // 虚空裂缝
      ctx.strokeStyle=sc;ctx.lineWidth=1;
      for(let i=0;i<3;i++){
        const a=i*Math.PI*2/3+frameCount*.02;
        ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*45,Math.sin(a)*30);ctx.stroke();
      }
    } else {
      // Corporate: 默认钻石形
      ctx.beginPath();
      ctx.moveTo(0,-42);ctx.lineTo(30,-20);ctx.lineTo(40,0);ctx.lineTo(30,25);
      ctx.lineTo(10,40);ctx.lineTo(-10,40);ctx.lineTo(-30,25);ctx.lineTo(-40,0);
      ctx.lineTo(-30,-20);ctx.closePath();
      ctx.fill();
      ctx.strokeStyle=sc;ctx.lineWidth=3;ctx.shadowColor=sc;ctx.shadowBlur=20;ctx.stroke();ctx.shadowBlur=0;
    }
    // 能量核心
    const core=ctx.createRadialGradient(0,0,0,0,0,16);
    core.addColorStop(0,'#fff');core.addColorStop(.3,cc);core.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=core;ctx.beginPath();ctx.arc(0,0,16,0,Math.PI*2);ctx.fill();
    // 小血条
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(-30,-52,60,4);
    ctx.fillStyle=hpRatio>.5?sc:'#f00';ctx.fillRect(-30,-52,60*hpRatio,4);
    // 名字 + 称号
    ctx.fillStyle='#fff';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    ctx.shadowColor=sc;ctx.shadowBlur=8;ctx.fillText(e.name,0,-56);
    ctx.shadowBlur=0;
    ctx.fillStyle='#ff0';ctx.font='9px sans-serif';ctx.fillText(`【${e.title}】`,0,-44);
  } else if(e.type==='large'){
    ctx.fillStyle=bc;ctx.strokeStyle=sc;ctx.lineWidth=2;
    ctx.beginPath();
    for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6,r=26;if(i===0)ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
    ctx.closePath();ctx.fill();ctx.stroke();
    ctx.fillStyle=cc;ctx.beginPath();ctx.arc(0,0,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(-14,-e.h/2-6,28,3);
    ctx.fillStyle=hpRatio>.5?sc:'#f00';ctx.fillRect(-14,-e.h/2-6,28*hpRatio,3);
  } else if(e.type==='medium'){
    ctx.fillStyle=bc;ctx.strokeStyle=sc;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,-17);ctx.lineTo(16,0);ctx.lineTo(0,17);ctx.lineTo(-16,0);ctx.closePath();ctx.fill();ctx.stroke();
    ctx.fillStyle=cc;ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fill();
  } else {
    ctx.fillStyle=sc;ctx.shadowColor=sc;ctx.shadowBlur=6;
    ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(9,0);ctx.lineTo(0,10);ctx.lineTo(-9,0);ctx.closePath();ctx.fill();ctx.shadowBlur=0;
  }
  
  // === 名称标签 ===
  const nameY=e.type==='boss'?-e.h/2-20:(e.type==='large'?-e.h/2-14:(e.type==='medium'?-e.h/2-12:-e.h/2-8));
  const nameSize=e.type==='boss'?13:(e.type==='large'?9:8);
  const nameAlpha=e.type==='boss'?1:.5;
  ctx.fillStyle=`rgba(255,255,255,${nameAlpha})`;ctx.font=`bold ${nameSize}px sans-serif`;
  ctx.textAlign='center';
  if(e.type==='boss'){
    ctx.shadowColor=`rgba(${parseColor(sc)},0.8)`;ctx.shadowBlur=10;
    ctx.fillText('⚡ '+e.name+' ⚡',0,nameY);
    ctx.shadowBlur=0;
  } else {
    ctx.fillText(e.name,0,nameY);
  }
  ctx.textAlign='left';
  
  ctx.globalAlpha=1;
  ctx.restore();
}

function enemyShoot(e){
  const bsm=getDynamicBulletSpeed();
  if(e.type==='boss'){
    // 攻击预警：发射前闪烁
    e.telegraphTimer=0.3;
    // 根据Boss类型选择弹幕模式
    const bossType=e.bossType||'corporate';
    const bp=BOSS_PATTERNS[bossType]||BOSS_PATTERNS['corporate'];
    const p=e.pattern%bp.patterns.length;
    if(bp.patterns[p]) bp.patterns[p](e,bsm);
    e.pattern++;
  } else if(e.type==='large'){
    enemyBullets.push({x:e.x,y:e.y+15,vx:-40*bsm,vy:220*bsm,life:4,alive:true});
    enemyBullets.push({x:e.x,y:e.y+15,vx:40*bsm,vy:220*bsm,life:4,alive:true});
    if(currentDifficulty==='hard'||currentDifficulty==='hell'){
      enemyBullets.push({x:e.x,y:e.y+15,vx:0,vy:240*bsm,life:3.5,alive:true});
    }
    // 高难度额外弹幕
    if(getDynamicScale()>2){
      enemyBullets.push({x:e.x-10,y:e.y+10,vx:-80*bsm,vy:200*bsm,life:3,alive:true});
      enemyBullets.push({x:e.x+10,y:e.y+10,vx:80*bsm,vy:200*bsm,life:3,alive:true});
    }
  } else if(e.type==='medium'){
    enemyBullets.push({x:e.x,y:e.y+10,vx:0,vy:200*bsm,life:3.5,alive:true});
    if(getDynamicScale()>1.5){
      enemyBullets.push({x:e.x-8,y:e.y+8,vx:-30*bsm,vy:180*bsm,life:3,alive:true});
      enemyBullets.push({x:e.x+8,y:e.y+8,vx:30*bsm,vy:180*bsm,life:3,alive:true});
    }
  } else {
    if(Math.random()<.4) enemyBullets.push({x:e.x,y:e.y+8,vx:0,vy:180*bsm,life:3,alive:true});
    // 高难度小兵也发射
    if(getDynamicScale()>2.5&&Math.random()<.3){
      enemyBullets.push({x:e.x,y:e.y+8,vx:(Math.random()-.5)*80*bsm,vy:150*bsm,life:2.5,alive:true});
    }
  }
}

function drawEnemyBullet(b){
  ctx.save();ctx.translate(b.x,b.y);
  const grad=ctx.createRadialGradient(0,-2,1,0,0,6);
  grad.addColorStop(0,'#fff');grad.addColorStop(.3,'#f44');grad.addColorStop(1,'rgba(255,0,0,0)');
  ctx.fillStyle=grad;ctx.beginPath();ctx.arc(0,0,6,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,50,50,0.3)';ctx.fillRect(-2,2,4,10);
  ctx.restore();
}

function createItem(x,y,type,weaponSub){return {x,y,type,weaponSub,vy:80,lived:0,maxLife:8,alive:true,yoy:0,collecting:false,collectSpeed:0};}
const ITEM_COLORS={weapon:'#0ff',bomb:'#ff0',star:'#ff0',shield:'#0f0',coin:'#FD0',health:'#f0f',drone:'#4af',evolve:'#f0f'};

function drawItem(it){
  ctx.save();ctx.translate(it.x,it.y+(it.collecting?0:it.yoy));
  if(!it.collecting) it.yoy=Math.sin(it.lived*4)*3;

  ctx.fillStyle=glow;ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  const wpIcon=it.type==='weapon'&&it.weaponSub&&WEAPON_TYPES[it.weaponSub]?WEAPON_TYPES[it.weaponSub].icon:'';
  const icons={weapon:(wpIcon||'🔷'),bomb:'💣',star:'⭐',shield:'🛡️',coin:'🪙',health:'❤️',drone:'🛸',evolve:'🧬'};
  ctx.fillText(icons[it.type]||'?',0,0);

}

function activateStarStorm(){
  if(starStormGauge<100||starStormActive) return;
  starStormGauge=0;
  starStormActive=true;
  starStormTimer=2.5; // 持续2.5秒
  screenShakeTrauma=0.8;

  enemyBullets.forEach(b=>{
    spawnParticles(b.x,b.y,3,'#0cf',40,.3,1.5);
  });
  enemyBullets=[];
  // 伤害所有敌机
  enemies.forEach(e=>{
    if(e.type==='small'||e.type==='medium'){
      e.hp=0;
      spawnParticles(e.x,e.y,12,'#ff0',80,.4,2.5);
    } else {
      e.hp=Math.max(1,Math.floor(e.hp*.5)); // Boss掉50%血
      spawnParticles(e.x,e.y,20,'#f80',100,.5,3);

}

function updateStarStorm(dt){
  if(!starStormActive) return;
  starStormTimer-=dt;
  // 星风暴持续期间的视觉效果：环绕玩家的光环
  if(Math.random()<.4){
    const a=Math.random()*Math.PI*2, r=40+Math.random()*60;
    particles.push(new Particle(player.x+Math.cos(a)*r,player.y+Math.sin(a)*r,0,0,.35,'#0cf',1.2));
  }
  if(starStormTimer<=0) starStormActive=false;
}

// ==================== 风筝伴侣（无人机）系统 ====================
const DRONE_TYPES = [
  {name:'攻击型',icon:'🔴',color:'#f44',desc:'自动射击',shootRate:1.2},
  {name:'防御型',icon:'🛡️',color:'#4af',desc:'吸收敌弹',absorbRange:50},
  {name:'支援型',icon:'💚',color:'#0f0',desc:'缓慢回血',healRate:5}
];
function addDrone(){
  if(drones.length>=3) return;
  const idx=drones.length;
  const type=DRONE_TYPES[idx];
  drones.push({
    idx, type:type.name, color:type.color, icon:type.icon,
    orbitAngle:idx*Math.PI*2/3, orbitRadius:35+idx*12,
    shootTimer:0, absorbCooldown:0, healTimer:0
  });
  addScorePopup(player.x,player.y-30,'🛸 '+type.name+'无人机','#4af',16);
  SFX.powerup&&SFX.powerup();
}
function updateDrones(dt){
  if(!player.alive) return;
  drones.forEach(d=>{
    // 环绕玩家旋转
    d.orbitAngle+=dt*2.5;
    d.x=player.x+Math.cos(d.orbitAngle)*d.orbitRadius;
    d.y=player.y+Math.sin(d.orbitAngle)*d.orbitRadius;
    // 攻击型：自动射击
    if(d.type==='攻击型'){
      d.shootTimer-=dt;
      if(d.shootTimer<=0){
        let nx=0,ny=-1,md=350;
        enemies.forEach(e=>{const dx=e.x-d.x,dy=e.y-d.y,d2=Math.hypot(dx,dy);if(d2<md){md=d2;nx=dx/d2;ny=dy/d2;}});
        if(md<350){
          enemyBullets.push({x:d.x,y:d.y,vx:nx*350,vy:ny*350,life:2,alive:true,color:'#f84',isDrone:true});
        }
        d.shootTimer=DRONE_TYPES[0].shootRate;
      }
    }
    // 防御型：吸收附近敌弹
    if(d.type==='防御型'){
      d.absorbCooldown-=dt;
      if(d.absorbCooldown<=0){
        for(let i=enemyBullets.length-1;i>=0;i--){
          const b=enemyBullets[i];
          if(!b.isDrone&&Math.hypot(b.x-d.x,b.y-d.y)<DRONE_TYPES[1].absorbRange){
            spawnParticles(b.x,b.y,2,'#4af',30,.2,1);
            enemyBullets.splice(i,1);
            d.absorbCooldown=0.3; // 吸收冷却
            break;
          }
        }
      }
    }
    // 支援型：缓慢回血
    if(d.type==='支援型'){
      d.healTimer+=dt;
      if(d.healTimer>=DRONE_TYPES[2].healRate&&player.hp<player.maxHp){
        player.hp=Math.min(player.maxHp,player.hp+1);
        d.healTimer=0;
        if(Math.random()<.3) particles.push(new Particle(d.x,d.y,0,0,.3,'#0f0',1));
      }
    }
  });
}
function drawDrones(){
  drones.forEach(d=>{
    ctx.save();
    ctx.translate(d.x,d.y);
    // 无人机主体
    ctx.fillStyle=d.color;
    ctx.shadowColor=d.color;ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    // 环绕光环
    ctx.strokeStyle=d.color+'80';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(0,0,8,0,Math.PI*2);ctx.stroke();
    // 类型图标（小）
    ctx.fillStyle='#fff';ctx.font='8px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(d.icon,0,0);
    ctx.restore();
  });
}

// ==================== 背景 ====================
let bgStars=[];
function initBg(){
  bgStars=[];
  for(let i=0;i<150;i++) bgStars.push({x:Math.random()*W,y:Math.random()*H,size:Math.random()*2+.5,twinkle:Math.random()*Math.PI*2,speed:Math.random()*.5+.3});
}
function drawBg(offset){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  bgStars.forEach(s=>{
    const sy=(s.y+offset*.05)%H;
    ctx.fillStyle=`rgba(255,255,255,${.4+.6*Math.abs(Math.sin(s.twinkle+frameCount*.02))})`;
    ctx.fillRect(s.x,sy,s.size,s.size);
  });
  const cityY=H*.6+offset*.2;
  ctx.fillStyle='rgba(5,10,30,0.9)';ctx.beginPath();ctx.moveTo(0,H);
  for(let x=0;x<W;x+=30){
    const h=40+Math.sin(x*.02+offset*.01)*30+Math.sin(x*.05)*15;
    ctx.lineTo(x,cityY-h);
  }
  ctx.lineTo(W,H);ctx.fill();
  for(let x=0;x<W;x+=60){
    const h=40+Math.sin(x*.02+offset*.01)*30+Math.sin(x*.05)*15;
    const colors=['#f0f','#0ff','#ff0','#0f0','#f80'];
    ctx.fillStyle=colors[Math.floor(x/60)%colors.length];ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=4;
    ctx.fillRect(x-1,cityY-h-1,3,3);ctx.shadowBlur=0;
  }
  const cloudBase=H*.35+offset*.35;
  ctx.fillStyle='rgba(10,20,60,0.5)';
  for(let x=-50;x<W+50;x+=80){
    const cy2=cloudBase+Math.sin(x*.015+offset*.015)*25;
    ctx.beginPath();ctx.ellipse(x,cy2,50+Math.sin(x)*15,12+Math.cos(x)*6,0,0,Math.PI*2);ctx.fill();
  }
}

// ==================== 天气 ====================
let weather={type:'clear',timer:15+Math.random()*30};
function updateWeather(dt){
  weather.timer-=dt;
  if(weather.timer<=0){
    const types=['clear','clear','clear','rain','rainbow','meteor'];
    weather.type=types[Math.floor(Math.random()*types.length)];
    weather.duration=weather.type==='clear'?15+Math.random()*20:(5+Math.random()*8);
    weather.timer=weather.duration;
  }
}
function drawWeather(offset){
  if(weather.type==='rain'){
    for(let i=0;i<30;i++){
      const rx=(Math.sin(i*137.5+frameCount*.1)+1)*W/2;
      const ry=(i*37+offset*50)%H;
      ctx.strokeStyle='rgba(100,180,255,0.3)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(rx,ry);ctx.lineTo(rx-15,ry+25);ctx.stroke();
    }
  } else if(weather.type==='rainbow'){
    ctx.save();ctx.globalAlpha=.2;
    ['#f00','#f80','#ff0','#0f0','#0ff','#06f','#90f'].forEach((c,i)=>{
      ctx.strokeStyle=c;ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(W/2,H/2+100+offset*.3,180-i*10,Math.PI*1.1,Math.PI*1.9);ctx.stroke();
    });
    ctx.restore();
    if(Math.random()<.02) items.push(createItem(Math.random()*W,-20,'coin'));
  } else if(weather.type==='meteor'){
    for(let i=0;i<5;i++){
      const mx=Math.random()*W,my=Math.random()*H*.6;
      ctx.strokeStyle=`rgba(255,255,200,${.3+Math.random()*.4})`;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(mx,my);ctx.lineTo(mx-30,my+50);ctx.stroke();
      ctx.fillStyle=`rgba(255,255,200,${.2})`;ctx.beginPath();ctx.arc(mx-30,my+50,2,0,Math.PI*2);ctx.fill();
    }
    if(Math.random()<.02) items.push(createItem(Math.random()*W,-20,'star'));
  }
}

// ==================== 成就弹窗 ====================
let achievementQueue=[], achievementPopupTimer=0;
function unlockAchievement(aid){
  if(achievements.includes(aid)) return;
  achievements.push(aid);SAVE.set('achievements',achievements);
  achievementQueue.push(aid);
  SFX.achievement();
}

function showAchievement(){
  if(achievementQueue.length===0||achievementPopupTimer>0) return;
  const aid=achievementQueue[0];
  const a=ACHIEVEMENTS.find(x=>x.id===aid);
  if(!a) return;
  const popup=document.getElementById('achievement-popup');
  popup.querySelector('.ach-icon').textContent=a.icon;
  popup.querySelector('.ach-title').textContent=a.name;
  popup.querySelector('.ach-desc').textContent=a.desc;
  popup.classList.add('show');
  achievementPopupTimer=3;
  achievementQueue.shift();
  setTimeout(()=>{
    if(achievementQueue.length===0) popup.classList.remove('show');
  },2500);
}

// ==================== 死亡慢镜头 ====================
let deathSlowMo=0, deathTimer=0;
function gameOver(cause){
  gameRunning=false;player.alive=false;
  spawnParticles(player.x,player.y,60,'#fff',200,1,4);
  spawnParticles(player.x,player.y,40,'#f84',150,.8,3);
  spawnParticles(player.x,player.y,20,SKINS[currentSkin].color,180,1.2,4);
  screenShakeTrauma=0.9;deathSlowMo=1.5;
  SFX.die();stopBGM();
  // 剧终慢镜头粒子继续渲染1.5秒
  deathTimer=1.5;
  // 结局剧情（根据高度决定是悲壮结局还是英雄结局）
  const storyKey=heightM>=2000?'gameOverGood':'gameOver';
  setTimeout(()=>queueStory(STORY_DATA[storyKey]),800);

  const earned=Math.floor(score/10);
  totalCoins+=earned;gamesPlayed++;totalKills+=kills;
  if(heightM>recordHeight) recordHeight=Math.floor(heightM);
  SAVE.set('coins',totalCoins);SAVE.set('record',recordHeight);
  SAVE.set('kills',totalKills);SAVE.set('games',gamesPlayed);
  saveDaily();

  // Boss累积击杀
  let thisBossKills=0;
  const bIndex=achievements.findIndex(a=>a.id==='boss_slayer');
  if(bIndex>=0) thisBossKills=totalKills;

  // 检查成就
  const stats={
    games:gamesPlayed,kills:totalKills,height:heightM,bossKills:totalKills,
    maxCombo,coins:totalCoins,weapon3Distance,itemsCollected,survivalTime:gameTime
  };
  ACHIEVEMENTS.forEach(a=>{
    if(!achievements.includes(a.id)&&a.check(stats)) unlockAchievement(a.id);
  });

  setTimeout(()=>{
    // 排行榜
    const newEntry={score:Math.floor(score),height:Math.floor(heightM),kills,date:new Date().toLocaleDateString()};
    const lb=getLeaderboard();
    // 检查是否进入排行榜
    let lbRank=-1;
    lb.push(newEntry);
    lb.sort((a,b)=>b.score-a.score);
    const top10=lb.slice(0,10);
    const idx=top10.findIndex(e=>e.score===newEntry.score&&e.height===newEntry.height&&e.kills===newEntry.kills);
    if(idx>=0) lbRank=idx+1;
    SAVE.set('leaderboard',top10);

    document.getElementById('go-title').textContent=cause==='被击中了'?'被击落了':'坠落了';
    document.getElementById('go-cause').textContent=cause;
    document.getElementById('go-height').textContent=Math.floor(heightM)+'m';
    document.getElementById('go-score').textContent=score;
    document.getElementById('go-kills').textContent=kills;
    document.getElementById('go-combo').textContent=maxCombo;
    document.getElementById('go-coins').textContent=earned;
    document.getElementById('go-newRecord').style.display=(heightM>=recordHeight&&heightM>10)?'block':'none';
    
    // 排行榜展示
    const goLbEl=document.getElementById('go-lb');
    if(top10.length>0){
      goLbEl.style.display='block';
      let lbHTML='';
      top10.forEach((e,i)=>{
        const isCurrent=e.score===newEntry.score&&e.height===newEntry.height&&e.kills===newEntry.kills;
        const rankClass=i===0?'go-rank-1':(i===1?'go-rank-2':(i===2?'go-rank-3':''));
        lbHTML+=`<tr class="${isCurrent?'go-lb-current':''}">
          <td class="go-lb-rank ${rankClass}">#${i+1}</td>
          <td>${e.score}</td><td>${e.height}m</td><td>${e.kills}</td>
          <td>${e.date}</td></tr>`;
      });
      document.getElementById('go-lb-tbody').innerHTML=lbHTML;
    } else {
      goLbEl.style.display='none';
    }
    
    document.getElementById('gameover').style.display='flex';
    refreshMenu();
  },1000);
}
